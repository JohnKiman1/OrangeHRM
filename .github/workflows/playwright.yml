name: Playwright CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 0' # Sunday 9 PM UTC = Monday 12 AM EAT

# Permissions for deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install pnpm
        run: |
          npm install -g pnpm@9
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
      
      - name: Verify pnpm installation
        run: pnpm --version
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install ALL Playwright browsers
        run: pnpm exec playwright install --with-deps
      
      - name: Install Allure CLI (via npm)
        run: |
          npm install -g allure-commandline
          allure --version
      
      - name: Run Playwright tests on ${{ matrix.browser }}
        run: pnpm exec playwright test --project=${{ matrix.browser }}
        continue-on-error: true
      
      - name: Upload Allure Results for ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results
          retention-days: 5
      
      - name: Upload Playwright Report for ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: report/playwright-report/

  merge-reports:
    name: Merge Allure Reports
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install pnpm
        run: |
          npm install -g pnpm@9
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
      
      - name: Verify pnpm installation
        run: pnpm --version
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Allure CLI (via npm)
        run: |
          npm install -g allure-commandline
          allure --version
      
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true
      
      - name: Generate Allure Report
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            pnpm exec allure generate allure-results --clean -o allure-report
            echo "✅ Allure report generated"
          else
            echo "⚠️ No Allure results found"
            mkdir -p allure-report
            echo "<html><body><h1>No test results available</h1></body></html>" > allure-report/index.html
          fi
      
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

  deploy-report:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: merge-reports
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  comment-pr:
    name: Comment PR with Report Link
    runs-on: ubuntu-latest
    needs: merge-reports
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Get Report URL
        id: report-url
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          REPORT_URL="https://${{ github.repository_owner }}.github.io/$REPO_NAME/"
          echo "url=$REPORT_URL" >> $GITHUB_OUTPUT
      
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const reportUrl = '${{ steps.report-url.outputs.url }}';
            const sha = context.sha;
            const workflowUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            const commentBody = `
            ## 📊 Allure Test Report
            
            ✅ The Allure report has been generated and deployed.
            
            | | |
            |---|---|
            | 🔗 **View Report** | ${reportUrl} |
            | 📝 **Commit** | \`${sha.substring(0, 7)}\` |
            | ⏱️ **Workflow** | [View Run](${workflowUrl}) |
            
            ---
            *This comment was automatically generated by GitHub Actions.*
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });