name: K6 Performance CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 0'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  k6-test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install pnpm
        run: |
          npm install -g pnpm@9
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz -L -o /tmp/k6.tgz
          tar -xzf /tmp/k6.tgz -C /tmp
          sudo mv /tmp/k6-v0.54.0-linux-amd64/k6 /usr/local/bin/k6
          k6 --version
      
      - name: Run K6 tests
        run: |
          mkdir -p report/k6-report report/k6-summary
          K6_ENV=develop k6 run \
            --summary-export=report/k6-summary/summary.json \
            --out json=report/k6-summary/metrics.json \
            tests/k6/scripts/smoke.js
        continue-on-error: true
      
      - name: Generate Report
        if: always()
        run: |
          if [ -d "report/k6-summary" ] && [ "$(ls -A report/k6-summary)" ]; then
            cp report/k6-summary/* report/k6-report/
            echo "✅ K6 report generated"
          else
            mkdir -p report/k6-report
            echo "<html><body><h1>No K6 results available</h1></body></html>" > report/k6-report/index.html
          fi
      
      - name: Upload K6 Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: report/k6-report/
          retention-days: 5

  deploy-k6-report:
    name: Deploy K6 Report
    runs-on: ubuntu-latest
    needs: k6-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Download K6 Report
        uses: actions/download-artifact@v4
        with:
          name: k6-report
          path: report/k6-report
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report/k6-report
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  comment-pr:
    name: Comment PR with K6 Report Link
    runs-on: ubuntu-latest
    needs: k6-test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Get Report URL
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          REPORT_URL="https://${{ github.repository_owner }}.github.io/$REPO_NAME/k6-report/"
          echo "REPORT_URL=$REPORT_URL" >> $GITHUB_ENV
      
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const reportUrl = process.env.REPORT_URL;
            const sha = context.sha;
            const workflowUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ## 📊 K6 Performance Test Report
              
              ✅ The K6 performance report has been generated.
              
              | | |
              |---|---|
              | 🔗 **View Report** | ${reportUrl} |
              | 📝 **Commit** | \`${sha.substring(0, 7)}\` |
              | ⏱️ **Workflow** | [View Run](${workflowUrl}) |
              `
            });